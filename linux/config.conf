# ShadowGuard Configuration File

# Paths to monitor (space separated)
MONITOR_PATHS="/etc /usr/bin /home"

# Scan interval in seconds
SCAN_INTERVAL=300

# Alert level (1=Low, 2=Medium, 3=High)
ALERT_LEVEL=2

# Auto quarantine suspicious files (0=No, 1=Yes)
AUTO_QUARANTINE=1

# Log retention days
LOG_RETENTION=30

# Email alerts (leave empty to disable)
ALERT_EMAIL=""

# Excluded patterns
EXCLUDE_PATTERNS="*.tmp *.log *.bak"
